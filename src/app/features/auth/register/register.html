<div class="min-h-screen flex items-center justify-center bg-gray-50 py-12 px-4 sm:px-6 lg:px-8 relative overflow-hidden">
  <!-- Subtle Background Orbs -->
  <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-indigo-200/40 blur-3xl mix-blend-multiply pointer-events-none"></div>
  <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] rounded-full bg-purple-200/40 blur-3xl mix-blend-multiply pointer-events-none"></div>
  <div class="absolute top-[20%] right-[10%] w-[20%] h-[20%] rounded-full bg-blue-200/30 blur-3xl mix-blend-multiply pointer-events-none"></div>
  <div class="glass-panel w-full max-w-md p-6 fade-in-up relative z-10 border border-gray-200">
    <div class="text-center mb-5">
      <div class="inline-flex items-center justify-center w-12 h-12 rounded-2xl bg-gradient-to-tr from-indigo-500 to-purple-500 mb-2 shadow-lg shadow-indigo-500/30 text-white">
        <mat-icon class="scale-125">person_add</mat-icon>
      </div>
      <h2 class="text-2xl font-extrabold text-gray-900 tracking-tight">Create Account</h2>
      <p class="mt-1 text-sm text-gray-700">
        Already have an account? 
        <a routerLink="/login" class="font-bold text-indigo-600 hover:text-indigo-800 transition-colors underline">
          Sign in here
        </a>
      </p>
    </div>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-2">
      <div *ngIf="errorMessage" class="bg-red-100 border border-red-300 text-red-700 p-2 rounded-lg text-xs text-center mb-1 fade-in-up shadow-sm">
        {{ errorMessage }}
      </div>

      <mat-form-field appearance="outline" class="w-full">
        <mat-label>Username</mat-label>
        <input matInput formControlName="username" placeholder="Choose a username">
        <mat-icon matSuffix class="text-gray-500">person_outline</mat-icon>
        <mat-error *ngIf="registerForm.get('username')?.hasError('required')">
          Username is required
        </mat-error>
        <mat-error *ngIf="registerForm.get('username')?.hasError('minlength')">
          Username must be at least 3 characters
        </mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="w-full">
        <mat-label>Password</mat-label>
        <input matInput type="password" formControlName="password" placeholder="Create a password">
        <mat-icon matSuffix class="text-gray-500">lock_outline</mat-icon>
        <mat-error *ngIf="registerForm.get('password')?.hasError('required')">
          Password is required
        </mat-error>
        <mat-error *ngIf="registerForm.get('password')?.hasError('minlength')">
          Password must be at least 6 characters
        </mat-error>
      </mat-form-field>

      <button type="submit" [disabled]="registerForm.invalid || isLoading" class="btn btn-primary w-full mt-3 text-base py-3 shadow-xl">
        <span *ngIf="!isLoading">Register Now</span>
        <span *ngIf="isLoading" class="flex items-center justify-center gap-2">
          <mat-icon class="animate-spin">autorenew</mat-icon> Creating account...
        </span>
      </button>
    </form>
  </div>
</div>
