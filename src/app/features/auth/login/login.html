<div class="min-h-screen flex items-center justify-center bg-gray-50 py-12 px-4 sm:px-6 lg:px-8 relative overflow-hidden">
  <!-- Subtle Background Orbs -->
  <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-indigo-200/40 blur-3xl mix-blend-multiply pointer-events-none"></div>
  <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] rounded-full bg-purple-200/40 blur-3xl mix-blend-multiply pointer-events-none"></div>
  <div class="absolute top-[20%] right-[10%] w-[20%] h-[20%] rounded-full bg-blue-200/30 blur-3xl mix-blend-multiply pointer-events-none"></div>
  <div class="glass-panel w-full max-w-md p-6 fade-in-up relative z-10 border border-gray-200">
    <div class="text-center mb-5">
      <div class="inline-flex items-center justify-center w-12 h-12 rounded-2xl bg-gradient-to-tr from-indigo-500 to-purple-500 mb-2 shadow-lg shadow-indigo-500/30 text-white">
        <mat-icon class="scale-125">fingerprint</mat-icon>
      </div>
      <h2 class="text-2xl font-extrabold text-gray-900 tracking-tight">Welcome Back</h2>
      <p class="mt-2 text-sm text-gray-700">
        Don't have an account? 
        <a routerLink="/register" class="font-bold text-indigo-600 hover:text-indigo-800 transition-colors underline">
          Register now
        </a>
      </p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-2">
      <div *ngIf="errorMessage" class="bg-red-100 border border-red-300 text-red-700 p-2 rounded-lg text-xs text-center mb-1 fade-in-up shadow-sm">
        {{ errorMessage }}
      </div>

      <mat-form-field appearance="outline" class="w-full">
        <mat-label>Username</mat-label>
        <input matInput formControlName="username" placeholder="Enter your username">
        <mat-icon matSuffix class="text-gray-500">person</mat-icon>
        <mat-error *ngIf="loginForm.get('username')?.hasError('required')">
          Username is required
        </mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="w-full">
        <mat-label>Password</mat-label>
        <input matInput type="password" formControlName="password" placeholder="Enter your password">
        <mat-icon matSuffix class="text-gray-500">lock</mat-icon>
        <mat-error *ngIf="loginForm.get('password')?.hasError('required')">
          Password is required
        </mat-error>
      </mat-form-field>

      <div class="flex flex-col gap-2 p-4 rounded-2xl bg-black/5 border border-black/10 mt-1">
        <div class="flex items-center justify-between">
          <span class="text-sm text-gray-800 font-semibold flex items-center gap-2">
            <mat-icon class="scale-75 text-indigo-600">security</mat-icon> Security Check
          </span>
          <button type="button" mat-icon-button class="text-indigo-600 hover:bg-black/5 scale-90" (click)="loadCaptcha()" matTooltip="Refresh CAPTCHA">
            <mat-icon>refresh</mat-icon>
          </button>
        </div>
        <div class="bg-white p-1 rounded-xl flex items-center justify-center shadow-sm border border-gray-200" [innerHTML]="captchaSvg"></div>
        
        <mat-form-field appearance="outline" class="w-full mt-2 mb-0">
          <mat-label>Enter CAPTCHA</mat-label>
          <input matInput formControlName="captchaText" placeholder="Type the text above">
          <mat-error *ngIf="loginForm.get('captchaText')?.hasError('required')">
            CAPTCHA is required
          </mat-error>
        </mat-form-field>
      </div>

      <button type="submit" [disabled]="loginForm.invalid || isLoading" class="btn btn-primary w-full mt-3 text-base py-3 shadow-xl">
        <span *ngIf="!isLoading">Sign in securely</span>
        <span *ngIf="isLoading" class="flex items-center justify-center gap-2">
          <mat-icon class="animate-spin">autorenew</mat-icon> Verifying...
        </span>
      </button>
    </form>
  </div>
</div>
